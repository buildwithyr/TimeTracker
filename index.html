<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
  <title>Bauteil-Tracker</title>
  <style>
    :root {
      --bg: #f2f2f7;
      --card: #ffffff;
      --text: #1c1c1e;
      --text-secondary: #8e8e93;
      --separator: #e5e5ea;
      --accent: #007aff;
      --accent-text: #ffffff;
      --danger: #ff3b30;
      --success: #34c759;
      --header-bg: rgba(242, 242, 247, 0.85);
      --tabbar-bg: rgba(249, 249, 249, 0.92);
      --input-bg: #ffffff;
      --shadow: rgba(0, 0, 0, 0.06);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --card: #1c1c1e;
        --text: #ffffff;
        --text-secondary: #98989f;
        --separator: #38383a;
        --accent: #0a84ff;
        --accent-text: #ffffff;
        --danger: #ff453a;
        --success: #30d158;
        --header-bg: rgba(0, 0, 0, 0.8);
        --tabbar-bg: rgba(22, 22, 22, 0.92);
        --input-bg: #1c1c1e;
        --shadow: rgba(0, 0, 0, 0.4);
      }
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--header-bg);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      padding-top: env(safe-area-inset-top);
      border-bottom: 0.5px solid var(--separator);
    }

    header h1 {
      margin: 0;
      padding: 10px 16px 12px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.4px;
    }

    /* Main scroll area */
    main {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px;
      padding-bottom: calc(16px + 60px + env(safe-area-inset-bottom));
    }

    .screen { display: none; }
    .screen.active { display: block; }

    /* Cards */
    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 1px 3px var(--shadow);
    }

    .card-label {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }

    /* Buttons */
    button {
      font-family: inherit;
      font-size: 17px;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      min-height: 50px;
      padding: 0 18px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.05s;
    }

    button:active { transform: scale(0.98); opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: default; }

    .btn-primary {
      background: var(--accent);
      color: var(--accent-text);
      width: 100%;
    }

    .btn-success {
      background: var(--success);
      color: #fff;
      width: 100%;
    }

    .btn-secondary {
      background: var(--separator);
      color: var(--text);
      width: 100%;
    }

    .btn-row { display: flex; gap: 10px; }
    .btn-row button { flex: 1; }

    /* Detected part */
    .bauteil-display {
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      padding: 14px;
      letter-spacing: -0.3px;
      word-break: break-all;
    }

    .bauteil-display.empty {
      font-size: 16px;
      font-weight: 400;
      color: var(--text-secondary);
    }

    /* Timer */
    .timer {
      font-size: 64px;
      font-weight: 200;
      text-align: center;
      font-variant-numeric: tabular-nums;
      letter-spacing: 2px;
      padding: 10px 0 18px;
      font-feature-settings: "tnum";
    }

    .timer.running { color: var(--accent); }

    /* Inputs */
    input[type="text"], textarea {
      font-family: inherit;
      font-size: 16px;
      width: 100%;
      padding: 13px 14px;
      border: 1px solid var(--separator);
      border-radius: 12px;
      background: var(--input-bg);
      color: var(--text);
      resize: none;
    }

    input[type="text"]:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    .input-row { display: flex; gap: 10px; }
    .input-row input { flex: 1; }
    .input-row button { width: auto; flex: 0 0 auto; padding: 0 20px; }

    /* Scanner / video */
    #scannerWrap {
      display: none;
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      background: #000;
      margin-bottom: 16px;
      aspect-ratio: 3 / 4;
    }

    #scannerWrap.active { display: block; }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .scan-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .scan-frame {
      width: 75%;
      height: 30%;
      border: 3px solid rgba(255, 255, 255, 0.9);
      border-radius: 12px;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.35);
    }

    .scan-cancel {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      width: auto;
      padding: 0 24px;
      pointer-events: auto;
    }

    /* Stats */
    .stats {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat-card {
      flex: 1;
      background: var(--card);
      border-radius: 14px;
      padding: 16px;
      text-align: center;
      box-shadow: 0 1px 3px var(--shadow);
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* History list */
    .entry {
      background: var(--card);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 10px;
      box-shadow: 0 1px 3px var(--shadow);
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .entry-main { flex: 1; min-width: 0; }

    .entry-bauteil {
      font-size: 17px;
      font-weight: 600;
      word-break: break-all;
      margin-bottom: 3px;
    }

    .entry-meta {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .entry-time {
      font-size: 15px;
      font-weight: 600;
      color: var(--accent);
      margin-top: 5px;
    }

    .entry-notiz {
      font-size: 14px;
      color: var(--text);
      margin-top: 6px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .delete-btn {
      background: transparent;
      min-height: 0;
      padding: 6px;
      width: auto;
      flex: 0 0 auto;
      font-size: 22px;
      line-height: 1;
      color: var(--danger);
    }

    .empty-state {
      text-align: center;
      color: var(--text-secondary);
      padding: 40px 20px;
      font-size: 15px;
    }

    /* Tab bar */
    nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10;
      background: var(--tabbar-bg);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-top: 0.5px solid var(--separator);
      display: flex;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .tab {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-size: 10px;
      font-weight: 500;
      min-height: 50px;
      padding: 6px 0 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      border-radius: 0;
    }

    .tab:active { transform: none; opacity: 1; }
    .tab.active { color: var(--accent); }
    .tab svg { width: 26px; height: 26px; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <header>
    <h1 id="headerTitle">Scannen</h1>
  </header>

  <main>
    <!-- ===== SCAN SCREEN ===== -->
    <section id="screen-scan" class="screen active">
      <div id="scannerWrap">
        <video id="video" playsinline muted></video>
        <div class="scan-overlay"><div class="scan-frame"></div></div>
        <button class="scan-cancel" id="cancelScanBtn">Abbrechen</button>
      </div>

      <div class="card" id="scanCard">
        <div class="card-label">Bauteil</div>
        <div id="bauteilDisplay" class="bauteil-display empty">Noch kein Bauteil erfasst</div>
        <button class="btn-primary" id="scanBtn" style="margin-bottom:10px;">📷 Barcode scannen</button>
        <div class="input-row">
          <input type="text" id="manualInput" placeholder="oder Nummer eingeben" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
          <button class="btn-secondary" id="manualOkBtn">OK</button>
        </div>
      </div>

      <div class="card" id="timerCard">
        <div class="card-label">Zeit</div>
        <div id="timer" class="timer">00:00</div>
        <div class="btn-row" style="margin-bottom:12px;">
          <button class="btn-primary" id="startBtn" disabled>Start</button>
          <button class="btn-success" id="saveBtn" disabled>Speichern</button>
        </div>
        <textarea id="notizInput" rows="2" placeholder="Notiz (optional)"></textarea>
      </div>
    </section>

    <!-- ===== HISTORY SCREEN ===== -->
    <section id="screen-history" class="screen">
      <div class="stats">
        <div class="stat-card">
          <div class="stat-value" id="statCount">0</div>
          <div class="stat-label">Einträge</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statAvg">–</div>
          <div class="stat-label">Ø Zeit (min)</div>
        </div>
      </div>

      <button class="btn-primary" id="exportBtn" style="margin-bottom:16px;">⬇︎ CSV exportieren</button>

      <div id="historyList"></div>
    </section>
  </main>

  <nav>
    <button class="tab active" data-screen="scan" data-title="Scannen">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
      </svg>
      Scannen
    </button>
    <button class="tab" data-screen="history" data-title="Verlauf">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="8" y1="6" x2="21" y2="6"/>
        <line x1="8" y1="12" x2="21" y2="12"/>
        <line x1="8" y1="18" x2="21" y2="18"/>
        <line x1="3" y1="6" x2="3.01" y2="6"/>
        <line x1="3" y1="12" x2="3.01" y2="12"/>
        <line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
      Verlauf
    </button>
  </nav>

  <script src="https://unpkg.com/@zxing/library@0.19.3/umd/index.min.js"></script>
  <script>
  (function () {
    'use strict';

    /* ---------- IndexedDB ---------- */
    var DB_NAME = 'BauteilTracker';
    var DB_VERSION = 1;
    var STORE = 'eintraege';
    var db = null;

    function openDB() {
      return new Promise(function (resolve, reject) {
        var req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = function (e) {
          var d = e.target.result;
          if (!d.objectStoreNames.contains(STORE)) {
            var store = d.createObjectStore(STORE, { keyPath: 'id', autoIncrement: true });
            store.createIndex('datum', 'datum', { unique: false });
          }
        };
        req.onsuccess = function (e) { resolve(e.target.result); };
        req.onerror = function (e) { reject(e.target.error); };
      });
    }

    function addEntry(entry) {
      return new Promise(function (resolve, reject) {
        var tx = db.transaction(STORE, 'readwrite');
        var req = tx.objectStore(STORE).add(entry);
        req.onsuccess = function (e) { resolve(e.target.result); };
        req.onerror = function (e) { reject(e.target.error); };
      });
    }

    function deleteEntry(id) {
      return new Promise(function (resolve, reject) {
        var tx = db.transaction(STORE, 'readwrite');
        var req = tx.objectStore(STORE).delete(id);
        req.onsuccess = function () { resolve(); };
        req.onerror = function (e) { reject(e.target.error); };
      });
    }

    function getAllEntries() {
      return new Promise(function (resolve, reject) {
        var tx = db.transaction(STORE, 'readonly');
        var req = tx.objectStore(STORE).getAll();
        req.onsuccess = function (e) { resolve(e.target.result || []); };
        req.onerror = function (e) { reject(e.target.error); };
      });
    }

    /* ---------- DOM refs ---------- */
    var $ = function (id) { return document.getElementById(id); };
    var scannerWrap = $('scannerWrap');
    var video = $('video');
    var scanBtn = $('scanBtn');
    var cancelScanBtn = $('cancelScanBtn');
    var manualInput = $('manualInput');
    var manualOkBtn = $('manualOkBtn');
    var bauteilDisplay = $('bauteilDisplay');
    var startBtn = $('startBtn');
    var saveBtn = $('saveBtn');
    var timerEl = $('timer');
    var notizInput = $('notizInput');
    var exportBtn = $('exportBtn');
    var historyList = $('historyList');
    var statCount = $('statCount');
    var statAvg = $('statAvg');
    var headerTitle = $('headerTitle');

    /* ---------- State ---------- */
    var currentBauteil = null;
    var timerInterval = null;
    var startTime = 0;
    var elapsedSeconds = 0;
    var codeReader = null;

    /* ---------- Helpers ---------- */
    function pad(n) { return n < 10 ? '0' + n : '' + n; }

    function formatTimer(totalSeconds) {
      var m = Math.floor(totalSeconds / 60);
      var s = totalSeconds % 60;
      return pad(m) + ':' + pad(s);
    }

    function setBauteil(value) {
      currentBauteil = value;
      if (value) {
        bauteilDisplay.textContent = value;
        bauteilDisplay.classList.remove('empty');
        startBtn.disabled = false;
      } else {
        bauteilDisplay.textContent = 'Noch kein Bauteil erfasst';
        bauteilDisplay.classList.add('empty');
        startBtn.disabled = true;
      }
    }

    /* ---------- Scanner ---------- */
    function startScan() {
      if (typeof ZXing === 'undefined') {
        alert('Scanner konnte nicht geladen werden (keine Internetverbindung?). Bitte Nummer manuell eingeben.');
        return;
      }
      scannerWrap.classList.add('active');
      scanBtn.disabled = true;
      if (!codeReader) {
        codeReader = new ZXing.BrowserMultiFormatReader();
      }
      codeReader.decodeFromVideoDevice(null, video, function (result, err) {
        if (result) {
          var text = result.getText();
          stopScan();
          setBauteil(text);
        }
        // err on each frame without a code is normal — ignore
      }).catch(function (e) {
        stopScan();
        alert('Kamera konnte nicht geöffnet werden: ' + (e && e.message ? e.message : e));
      });
    }

    function stopScan() {
      if (codeReader) {
        try { codeReader.reset(); } catch (e) {}
      }
      scannerWrap.classList.remove('active');
      scanBtn.disabled = false;
    }

    /* ---------- Timer ---------- */
    function startTimer() {
      if (timerInterval) return;
      startTime = Date.now() - elapsedSeconds * 1000;
      timerInterval = setInterval(tick, 1000);
      tick();
      timerEl.classList.add('running');
      startBtn.disabled = true;
      saveBtn.disabled = false;
      // lock changing the part while running
      scanBtn.disabled = true;
      manualInput.disabled = true;
      manualOkBtn.disabled = true;
    }

    function tick() {
      elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
      timerEl.textContent = formatTimer(elapsedSeconds);
    }

    function stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
      timerEl.classList.remove('running');
    }

    function resetScanScreen() {
      stopTimer();
      elapsedSeconds = 0;
      startTime = 0;
      timerEl.textContent = '00:00';
      notizInput.value = '';
      manualInput.value = '';
      manualInput.disabled = false;
      manualOkBtn.disabled = false;
      scanBtn.disabled = false;
      saveBtn.disabled = true;
      setBauteil(null);
    }

    /* ---------- Save ---------- */
    function saveEntry() {
      if (!currentBauteil) return;
      stopTimer();
      var seconds = elapsedSeconds;
      var minuten = Math.round((seconds / 60) * 10) / 10;
      var entry = {
        bauteil: currentBauteil,
        datum: new Date().toISOString(),
        sekunden: seconds,
        minuten: minuten,
        notiz: notizInput.value.trim()
      };
      addEntry(entry).then(function () {
        resetScanScreen();
      }).catch(function (e) {
        alert('Speichern fehlgeschlagen: ' + e);
      });
    }

    /* ---------- History rendering ---------- */
    function formatDateParts(iso) {
      var d = new Date(iso);
      var datum = pad(d.getDate()) + '.' + pad(d.getMonth() + 1) + '.' + d.getFullYear();
      var uhrzeit = pad(d.getHours()) + ':' + pad(d.getMinutes());
      return { datum: datum, uhrzeit: uhrzeit };
    }

    function formatDuration(seconds) {
      var m = Math.floor(seconds / 60);
      var s = seconds % 60;
      return m + ' min ' + s + ' s';
    }

    function renderHistory() {
      return getAllEntries().then(function (entries) {
        entries.sort(function (a, b) { return b.id - a.id; });

        // stats
        statCount.textContent = entries.length;
        if (entries.length) {
          var totalMin = entries.reduce(function (sum, e) { return sum + (e.sekunden / 60); }, 0);
          var avg = totalMin / entries.length;
          statAvg.textContent = (Math.round(avg * 10) / 10).toString().replace('.', ',');
        } else {
          statAvg.textContent = '–';
        }

        // list
        historyList.textContent = '';
        if (!entries.length) {
          var empty = document.createElement('div');
          empty.className = 'empty-state';
          empty.textContent = 'Noch keine Einträge vorhanden.';
          historyList.appendChild(empty);
          return;
        }

        entries.forEach(function (e) {
          var parts = formatDateParts(e.datum);

          var row = document.createElement('div');
          row.className = 'entry';

          var mainDiv = document.createElement('div');
          mainDiv.className = 'entry-main';

          var b = document.createElement('div');
          b.className = 'entry-bauteil';
          b.textContent = e.bauteil;
          mainDiv.appendChild(b);

          var meta = document.createElement('div');
          meta.className = 'entry-meta';
          meta.textContent = parts.datum + ' · ' + parts.uhrzeit;
          mainDiv.appendChild(meta);

          var time = document.createElement('div');
          time.className = 'entry-time';
          time.textContent = formatDuration(e.sekunden);
          mainDiv.appendChild(time);

          if (e.notiz) {
            var n = document.createElement('div');
            n.className = 'entry-notiz';
            n.textContent = e.notiz;
            mainDiv.appendChild(n);
          }

          var del = document.createElement('button');
          del.className = 'delete-btn';
          del.setAttribute('aria-label', 'Löschen');
          del.textContent = '🗑';
          del.addEventListener('click', function () {
            if (confirm('Eintrag „' + e.bauteil + '" wirklich löschen?')) {
              deleteEntry(e.id).then(renderHistory);
            }
          });

          row.appendChild(mainDiv);
          row.appendChild(del);
          historyList.appendChild(row);
        });
      });
    }

    /* ---------- CSV export ---------- */
    function csvEscape(value) {
      var s = (value == null ? '' : String(value));
      if (s.indexOf('"') !== -1 || s.indexOf(';') !== -1 || s.indexOf('\n') !== -1 || s.indexOf('\r') !== -1) {
        s = '"' + s.replace(/"/g, '""') + '"';
      }
      return s;
    }

    function exportCSV() {
      getAllEntries().then(function (entries) {
        if (!entries.length) {
          alert('Keine Einträge zum Exportieren vorhanden.');
          return;
        }
        entries.sort(function (a, b) { return a.id - b.id; });

        var rows = ['Bauteilnummer;Datum;Uhrzeit;Minuten;Sekunden;Notiz'];
        entries.forEach(function (e) {
          var parts = formatDateParts(e.datum);
          var minuten = (Math.round((e.sekunden / 60) * 10) / 10).toString().replace('.', ',');
          rows.push([
            csvEscape(e.bauteil),
            parts.datum,
            parts.uhrzeit,
            minuten,
            String(e.sekunden),
            csvEscape(e.notiz)
          ].join(';'));
        });

        var csv = rows.join('\r\n');
        var BOM = '\uFEFF';
        var blob = new Blob([BOM + csv], { type: 'text/csv;charset=utf-8;' });

        var now = new Date();
        var fname = 'bauteil-zeiten-' + now.getFullYear() + '-' + pad(now.getMonth() + 1) + '-' + pad(now.getDate()) + '.csv';

        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = fname;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
      });
    }

    /* ---------- Tab navigation ---------- */
    function switchScreen(name, title) {
      var screens = document.querySelectorAll('.screen');
      for (var i = 0; i < screens.length; i++) screens[i].classList.remove('active');
      $('screen-' + name).classList.add('active');

      var tabs = document.querySelectorAll('.tab');
      for (var j = 0; j < tabs.length; j++) {
        tabs[j].classList.toggle('active', tabs[j].getAttribute('data-screen') === name);
      }
      headerTitle.textContent = title;

      if (name === 'history') {
        renderHistory();
      } else {
        // leaving for scan view; if camera somehow active, stop it
        if (scannerWrap.classList.contains('active')) stopScan();
      }
    }

    /* ---------- Wire events ---------- */
    scanBtn.addEventListener('click', startScan);
    cancelScanBtn.addEventListener('click', stopScan);

    manualOkBtn.addEventListener('click', function () {
      var v = manualInput.value.trim();
      if (v) { setBauteil(v); manualInput.value = ''; manualInput.blur(); }
    });
    manualInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { e.preventDefault(); manualOkBtn.click(); }
    });

    startBtn.addEventListener('click', startTimer);
    saveBtn.addEventListener('click', saveEntry);
    exportBtn.addEventListener('click', exportCSV);

    var tabs = document.querySelectorAll('.tab');
    for (var t = 0; t < tabs.length; t++) {
      tabs[t].addEventListener('click', function () {
        switchScreen(this.getAttribute('data-screen'), this.getAttribute('data-title'));
      });
    }

    // stop camera if app goes to background
    document.addEventListener('visibilitychange', function () {
      if (document.hidden && scannerWrap.classList.contains('active')) stopScan();
    });

    /* ---------- Init ---------- */
    openDB().then(function (d) {
      db = d;
      setBauteil(null);
    }).catch(function (e) {
      alert('Datenbank konnte nicht geöffnet werden: ' + e);
    });
  })();
  </script>
</body>
</html>
